<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wanderlust Travels - Travel Agency</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navigation -->
<nav class="navbar">
  <div class="container">
    <div class="logo">✈️ Wanderlust Travels</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="packages.html">Packages</a></li>
      <li><a href="bookings.html">My Bookings</a></li>
    </ul>
  </div>
</nav>

<!-- Hero Section -->
<section class="hero">
  <div class="hero-content">
    <h1>Explore the World</h1>
    <p>Discover amazing travel packages and book your dream vacation</p>
    <a href="packages.html" class="btn">Browse Packages</a>
  </div>
</section>

<!-- Featured Packages Section -->
<section class="featured">
  <div class="container">
    <h2>Featured Packages</h2>
    <div class="packages-grid" id="featuredPackages">
      <!-- Packages loaded by JavaScript -->
    </div>
  </div>
</section>

<!-- Footer -->
<footer>
  <p>&copy; 2026 Wanderlust Travels. All rights reserved.</p>
</footer>

<script>
  // Load featured packages
  async function loadFeaturedPackages() {
    try {
      const response = await fetch('/api/packages');
      const packages = await response.json();
      const grid = document.getElementById('featuredPackages');
      
      packages.slice(0, 4).forEach(pkg => {
        const card = document.createElement('div');
        card.className = 'package-card';
        card.innerHTML = `
          <img src="${pkg.image}" alt="${pkg.name}">
          <h3>${pkg.name}</h3>
          <p>${pkg.destination}</p>
          <p class="duration">⏱️ ${pkg.duration}</p>
          <p class="description">${pkg.description}</p>
          <p class="price">$${pkg.price} per person</p>
          <a href="book.html?id=${pkg.id}" class="btn-small">Book Now</a>
        `;
        grid.appendChild(card);
      });
    } catch (error) {
      console.error('Error loading packages:', error);
    }
  }

  loadFeaturedPackages();
</script>

</body>
</html>
